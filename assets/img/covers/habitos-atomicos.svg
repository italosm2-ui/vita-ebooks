<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 840" role="img" aria-labelledby="title desc">
  <title id="title">Habitos Atomicos</title>
  <desc id="desc">Capa editorial criada para o acervo Vita Ebooks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1219"/>
      <stop offset="52%" stop-color="#18354d"/>
      <stop offset="100%" stop-color="#25a38e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.18" r="0.9">
      <stop offset="0%" stop-color="#9ef7e2" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#67c7d8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#67c7d8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="840" rx="42" fill="url(#bg)"/>
  <rect x="42" y="42" width="516" height="756" rx="34" fill="none" stroke="rgba(255,255,255,0.16)"/>
  <circle cx="430" cy="170" r="170" fill="url(#glow)"/>
  <g opacity="0.17" fill="none" stroke="#dffdf7" stroke-width="2">
    <circle cx="434" cy="172" r="122"/>
    <circle cx="434" cy="172" r="92"/>
    <circle cx="434" cy="172" r="60"/>
  </g>
  <text x="58" y="94" fill="#c5fff0" font-size="20" font-family="Manrope, Arial, sans-serif" font-weight="800" letter-spacing="4">DESENVOLVIMENTO</text>
  <text x="58" y="362" fill="#f7fffc" font-size="84" font-family="Manrope, Arial, sans-serif" font-weight="800" letter-spacing="-3">Habitos</text>
  <text x="58" y="446" fill="#f7fffc" font-size="84" font-family="Manrope, Arial, sans-serif" font-weight="800" letter-spacing="-3">Atomicos</text>
  <text x="58" y="520" fill="#d0f4eb" font-size="24" font-family="Manrope, Arial, sans-serif" font-weight="600">Pequenas rotinas, grandes mudancas.</text>
  <rect x="58" y="606" width="228" height="10" rx="5" fill="#86f3d9" opacity="0.75"/>
  <rect x="58" y="632" width="180" height="10" rx="5" fill="#86f3d9" opacity="0.34"/>
